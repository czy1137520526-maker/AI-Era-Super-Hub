version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: manjuflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-manju}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manju123}
      POSTGRES_DB: ${POSTGRES_DB:-manjuflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manju"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - manjuflow-network

  # Redis 缓存和任务队列
  redis:
    image: redis:7-alpine
    container_name: manjuflow-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - manjuflow-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: manjuflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - manjuflow-network

  # FastAPI 后端服务
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: manjuflow-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://manju:manju123@postgres:5432/manjuflow
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: manjuflow-assets
      COMFYUI_URL: http://comfyui:8188
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - comfyui_workflows:/comfyui/workflows
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - manjuflow-network

  # Celery Worker (异步任务处理)
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: manjuflow-celery-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://manju:manju123@postgres:5432/manjuflow
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: manjuflow-assets
      COMFYUI_URL: http://comfyui:8188
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - ../backend:/app
      - comfyui_workflows:/comfyui/workflows
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=4
    networks:
      - manjuflow-network

  # Celery Beat (定时任务调度)
  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: manjuflow-celery-beat
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.workers.tasks beat --loglevel=info
    networks:
      - manjuflow-network

  # ComfyUI (AI 生成引擎)
  comfyui:
    image: comfyui/comfyui:latest
    container_name: manjuflow-comfyui
    ports:
      - "8188:8188"
    volumes:
      - ../comfyui/workflows:/ComfyUI/workflows
      - comfyui_models:/ComfyUI/models
      - comfyui_output:/ComfyUI/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - manjuflow-network

  # Next.js 前端服务
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: manjuflow-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev
    networks:
      - manjuflow-network

  # Nginx 反向代理 (可选)
  nginx:
    image: nginx:alpine
    container_name: manjuflow-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - manjuflow-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  comfyui_models:
    driver: local
  comfyui_output:
    driver: local
  comfyui_workflows:
    driver: local

networks:
  manjuflow-network:
    driver: bridge
