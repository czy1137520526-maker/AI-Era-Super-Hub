<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 AI Era Super-Hub — 国内外AI模型导航</title>
    <style>
        /* ================================================
           基础重置 & 布局
           ================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ================================================
           顶部 Header
           ================================================ */
        header {
            background: rgba(13,17,23,0.95);
            border-bottom: 1px solid #21262d;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 16px;
            height: 60px;
        }
        .logo {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
        }
        .logo span { color: #58a6ff; }

        /* ================================================
           搜索栏
           ================================================ */
        .search-wrap {
            flex: 1;
            max-width: 600px;
            position: relative;
        }
        .search-wrap input {
            width: 100%;
            padding: 8px 16px 8px 40px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-wrap input:focus { border-color: #58a6ff; }
        .search-wrap .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.6;
        }
        .search-hint {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: #8b949e;
            pointer-events: none;
        }

        /* ================================================
           地区筛选 Tab
           ================================================ */
        .region-tabs {
            display: flex;
            gap: 4px;
            background: #161b22;
            border-radius: 6px;
            padding: 3px;
        }
        .region-tabs button {
            padding: 5px 14px;
            border: none;
            border-radius: 4px;
            background: transparent;
            color: #8b949e;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .region-tabs button.active {
            background: #30363d;
            color: #fff;
        }
        .region-tabs button:hover:not(.active) { color: #e6edf3; }

        /* ================================================
           主内容区
           ================================================ */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ================================================
           提交按钮
           ================================================ */
        .submit-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .btn-submit {
            padding: 8px 18px;
            background: linear-gradient(135deg, #238636, #2ea043);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #2ea043, #3fb950);
            transform: translateY(-1px);
        }

        /* ================================================
           双栏布局（全部视图）
           ================================================ */
        .dual-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .column-section { display: flex; flex-direction: column; gap: 12px; }

        .column-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #161b22;
            border-radius: 8px;
            border-left: 3px solid;
        }
        .column-header.cn { border-color: #f85149; }
        .column-header.global { border-color: #58a6ff; }
        .column-header h2 { font-size: 15px; font-weight: 600; }
        .column-header .count {
            margin-left: auto;
            background: #30363d;
            color: #8b949e;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
        }

        /* ================================================
           分类标签行
           ================================================ */
        .category-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }
        .category-label {
            font-size: 11px;
            color: #8b949e;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 0;
        }

        /* ================================================
           模型卡片
           ================================================ */
        .card {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 14px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            border-color: #30363d;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .card-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .card-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .card-info { flex: 1; min-width: 0; }
        .card-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            display: flex;
            gap: 6px;
            margin-top: 3px;
        }
        .card-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        .badge-cn { background: rgba(248,81,73,0.15); color: #f85149; }
        .badge-global { background: rgba(88,166,255,0.15); color: #58a6ff; }
        .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
        .card-tag {
            font-size: 10px;
            padding: 2px 6px;
            background: #21262d;
            color: #8b949e;
            border-radius: 4px;
        }
        .card-desc {
            font-size: 12px;
            color: #8b949e;
            line-height: 1.5;
            margin-top: 6px;
        }
        .card-links {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .card-link {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            background: #21262d;
            color: #58a6ff;
            cursor: pointer;
            transition: background 0.2s;
            border: none;
        }
        .card-link:hover { background: #30363d; text-decoration: none; }

        /* 卡片悬停编辑/报错按钮 */
        .card-actions {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            gap: 4px;
        }
        .card:hover .card-actions { display: flex; }
        .card-action-btn {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .card-action-btn:hover { opacity: 1; }
        .btn-edit { background: #30363d; color: #e6edf3; }
        .btn-report { background: #30363d; color: #f85149; }

        /* ================================================
           单列布局（筛选视图）
           ================================================ */
        .single-column { display: flex; flex-direction: column; gap: 12px; }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        /* ================================================
           空状态
           ================================================ */
        .empty-state {
            text-align: center;
            padding: 48px;
            color: #8b949e;
        }
        .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; }

        /* ================================================
           Modal 弹窗
           ================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #21262d;
        }
        .modal-header h3 { font-size: 16px; color: #fff; }
        .modal-close {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }
        .modal-close:hover { color: #fff; }
        .modal-body { padding: 20px; }

        /* ================================================
           表单
           ================================================ */
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #8b949e;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-label .required { color: #f85149; margin-left: 2px; }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 8px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #58a6ff; }
        .form-textarea { resize: vertical; min-height: 80px; }
        .form-select { cursor: pointer; }

        .tag-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tag-checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            color: #8b949e;
            transition: all 0.2s;
            user-select: none;
        }
        .tag-checkbox-label input { display: none; }
        .tag-checkbox-label.checked {
            background: rgba(88,166,255,0.15);
            border-color: #58a6ff;
            color: #58a6ff;
        }
        .form-note {
            font-size: 11px;
            color: #8b949e;
            margin-top: 4px;
        }

        .form-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .btn-cancel {
            padding: 8px 18px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-cancel:hover { background: #30363d; }
        .btn-primary {
            padding: 8px 18px;
            background: linear-gradient(135deg, #238636, #2ea043);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: linear-gradient(135deg, #2ea043, #3fb950); }

        /* ================================================
           Toast 提示
           ================================================ */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2ea043;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            z-index: 300;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.warn { background: #9e6a03; }

        /* ================================================
           统计栏
           ================================================ */
        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #8b949e;
        }
        .stats-bar strong { color: #e6edf3; }

        /* ================================================
           响应式
           ================================================ */
        @media (max-width: 900px) {
            .dual-columns { grid-template-columns: 1fr; }
            .tools-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        }
        @media (max-width: 600px) {
            .header-inner { flex-wrap: wrap; height: auto; padding: 10px 0; gap: 8px; }
            .search-wrap { order: 3; max-width: 100%; width: 100%; }
            .region-tabs { gap: 2px; }
            .region-tabs button { padding: 4px 10px; font-size: 12px; }
            .main { padding: 16px; }
            .tools-grid { grid-template-columns: 1fr; }
            .stats-bar { flex-direction: column; gap: 4px; }
        }
        @media (max-width: 380px) {
            .region-tabs button { padding: 4px 8px; font-size: 11px; }
        }
    </style>
</head>
<body>

<!-- ========== Header ========== -->
<header>
    <div class="header-inner">
        <div class="logo">🤖 <span>AI Era</span> Super-Hub</div>

        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="搜索模型名称、简介、标签或地区..." autocomplete="off">
            <span class="search-hint">按 Enter 发送 / Esc 清空</span>
        </div>

        <div class="region-tabs" id="regionTabs">
            <button class="active" data-region="all">🌐 全部</button>
            <button data-region="CN">🇨🇳 国内</button>
            <button data-region="Global">🌍 国外</button>
        </div>
    </div>
</header>

<!-- ========== Main ========== -->
<main class="main">
    <div class="submit-bar">
        <button class="btn-submit" id="openSubmitBtn">➕ 提交新模型</button>
    </div>

    <div class="stats-bar" id="statsBar">
        <!-- JS 动态填充 -->
    </div>

    <div id="contentArea">
        <!-- JS 动态渲染 -->
    </div>
</main>

<!-- ========== 提交/编辑 Modal ========== -->
<div class="modal-overlay" id="formModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">📝 提交新模型</h3>
            <button class="modal-close" id="closeModal">×</button>
        </div>
        <div class="modal-body">
            <form id="toolForm">
                <input type="hidden" id="editId">

                <div class="form-group">
                    <label class="form-label">模型名称 <span class="required">*</span></label>
                    <input type="text" class="form-input" id="fName" placeholder="如：DeepSeek Chat" required>
                </div>

                <div class="form-group">
                    <label class="form-label">官网链接</label>
                    <input type="url" class="form-input" id="fUrl" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label class="form-label">模型简介 <span class="required">*</span></label>
                    <textarea class="form-textarea" id="fDesc" placeholder="简要描述模型的能力与特点..." required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">所属地区 <span class="required">*</span></label>
                    <select class="form-select" id="fRegion" required>
                        <option value="">请选择地区</option>
                        <option value="CN">🇨🇳 国内</option>
                        <option value="Global">🌍 国外</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">能力标签（可多选）</label>
                    <div class="tag-checkboxes" id="fTagsContainer">
                        <label class="tag-checkbox-label"><input type="checkbox" value="文本"> 文本</label>
                        <label class="tag-checkbox-label"><input type="checkbox" value="绘图"> 绘图</label>
                        <label class="tag-checkbox-label"><input type="checkbox" value="代码"> 代码</label>
                        <label class="tag-checkbox-label"><input type="checkbox" value="搜索"> 搜索</label>
                        <label class="tag-checkbox-label"><input type="checkbox" value="视频"> 视频</label>
                        <label class="tag-checkbox-label"><input type="checkbox" value="多模态"> 多模态</label>
                        <label class="tag-checkbox-label"><input type="checkbox" value="推理"> 推理</label>
                        <label class="tag-checkbox-label"><input type="checkbox" value="写作"> 写作</label>
                    </div>
                    <p class="form-note">💡 提交的数据仅保存在本地浏览器，不会同步到服务器</p>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelForm">取消</button>
                    <button type="submit" class="btn-primary" id="submitFormBtn">提交</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ========== Toast ========== -->
<div class="toast" id="toast"></div>

      tags: ['绘图'], url: 'https://www.midjourney.com' },
    { id: 'stablediffusion', name: 'Stable Diffusion', logo: '🖼️', region: 'Global',
      desc: 'Stability AI开源绘图模型，可本地部署，支持ControlNet等插件生态。',
      tags: ['绘图'], url: 'https://stability.ai' },
    { id: 'grok', name: 'Grok', logo: '🤔', region: 'Global',
      desc: 'xAI推出的AI助手，实时信息获取能力强，回答风格幽默直接。',
      tags: ['搜索', '文本', '推理'], url: 'https://x.ai/grok' },
];

/* ================================================
   状态管理
   ================================================ */
const AppState = {
    currentRegion: 'all',   // 'all' | 'CN' | 'Global'
    searchQuery: '',
    customTools: [],        // 从 localStorage 加载
    editingId: null,
};

/* ================================================
   localStorage 键名（避免与旧版冲突）
   ================================================ */
const STORAGE_KEY = 'ai_hub_custom_tools_v2';

/* ================================================
   加载自定义工具
   ================================================ */
function loadCustomTools() {
    try {
        const stored = localStorage.getItem(STORAGE_KEY);
        AppState.customTools = stored ? JSON.parse(stored) : [];
    } catch (e) {
        AppState.customTools = [];
    }
}

/* ================================================
   保存自定义工具
   ================================================ */
function saveCustomTools() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(AppState.customTools));
    } catch (e) { /* 存储满时静默失败 */ }
}

/* ================================================
   合并数据库（内置 + 用户自定义）
   ================================================ */
function getMergedTools() {
    return [...AI_TOOLS_DB, ...AppState.customTools];
}

/* ================================================
   搜索过滤
   ================================================ */
function filterTools(tools) {
    const q = AppState.searchQuery.trim().toLowerCase();
    let result = tools;

    // 地区过滤
    if (AppState.currentRegion !== 'all') {
        result = result.filter(t => t.region === AppState.currentRegion);
    }

    // 搜索过滤（名称 / 简介 / 标签 / 地区关键词）
    if (q.length >= 1) {
        const keywords = q.split(/\s+/); // 支持"国内 绘图"类搜索
        result = result.filter(t => {
            const haystack = [
                t.name, t.desc,
                ...(t.tags || []),
                t.region === 'CN' ? '国内' : '国外',
                t.region,
            ].join(' ').toLowerCase();
            return keywords.every(kw => haystack.includes(kw));
        });
    }

    return result;
}

/* ================================================
   统计栏渲染
   ================================================ */
function renderStats(total, filtered, customCount) {
    const bar = document.getElementById('statsBar');
    bar.innerHTML = `
        共 <strong>${total}</strong> 个模型
        &nbsp;·&nbsp;
        <strong>${customCount}</strong> 个用户提交
        ${filtered !== total ? `&nbsp;·&nbsp; 已筛选 <strong>${filtered}</strong> 个` : ''}
    `;
}

/* ================================================
   单个卡片渲染
   ================================================ */
function renderCard(tool, isCustom) {
    const regionLabel = tool.region === 'CN' ? '🇨🇳 国内' : '🌍 国外';
    const regionClass = tool.region === 'CN' ? 'badge-cn' : 'badge-global';
    const tagsHtml = (tool.tags || []).map(tag => `<span class="card-tag">${tag}</span>`).join('');

    const editBtn = isCustom
        ? `<button class="card-action-btn btn-edit" data-id="${tool.id}" onclick="openEditModal('${tool.id}')">编辑</button>`
        : '';
    const reportBtn = !isCustom
        ? `<button class="card-action-btn btn-report" onclick="showToast('已记录报错信息，感谢反馈！', 'warn')">报错</button>`
        : '';

    return `
    <div class="card" id="card-${tool.id}">
        <div class="card-actions">${editBtn}${reportBtn}</div>
        <div class="card-top">
            <div class="card-logo" style="background:${tool.region === 'CN' ? 'rgba(248,81,73,0.15)' : 'rgba(88,166,255,0.15)'}">
                ${tool.logo}
            </div>
            <div class="card-info">
                <div class="card-name">${tool.name}${isCustom ? ' ⭐' : ''}</div>
                <div class="card-meta">
                    <span class="card-badge ${regionClass}">${regionLabel}</span>
                </div>
            </div>
        </div>
        <div class="card-tags">${tagsHtml}</div>
        <div class="card-desc">${tool.desc}</div>
        ${tool.url ? `<div class="card-links"><a class="card-link" href="${tool.url}" target="_blank" rel="noopener">🔗 访问官网</a></div>` : ''}
    </div>`;
}

/* ================================================
   主内容渲染（双栏 / 单列自适应）
   ================================================ */
function renderContent() {
    const all = getMergedTools();
    const filtered = filterTools(all);
    const customCount = AppState.customTools.length;

    renderStats(all.length, filtered.length, customCount);

    const content = document.getElementById('contentArea');

    if (filtered.length === 0) {
        content.innerHTML = `
            <div class="empty-state">
                <div class="emoji">🔍</div>
                <p>没有找到匹配的模型，试试其他关键词</p>
            </div>`;
        return;
    }

    // 全部视图：双栏
    if (AppState.currentRegion === 'all') {
        const cnTools = filtered.filter(t => t.region === 'CN');
        const globalTools = filtered.filter(t => t.region === 'Global');

        const cnCards = cnTools.map(t => renderCard(t, isCustomTool(t.id))).join('');
        const globalCards = globalTools.map(t => renderCard(t, isCustomTool(t.id))).join('');

        content.innerHTML = `
            <div class="dual-columns">
                <div class="column-section">
                    <div class="column-header cn">
                        <span>🇨🇳</span>
                        <h2>国内模型</h2>
                        <span class="count">${cnTools.length}</span>
                    </div>
                    ${cnCards || '<div class="empty-state"><p>无匹配结果</p></div>'}
                </div>
                <div class="column-section">
                    <div class="column-header global">
                        <span>🌍</span>
                        <h2>国外模型</h2>
                        <span class="count">${globalTools.length}</span>
                    </div>
                    ${globalCards || '<div class="empty-state"><p>无匹配结果</p></div>'}
                </div>
            </div>`;
    }
    // 筛选视图：单列网格
    else {
        const label = AppState.currentRegion === 'CN' ? '🇨🇳 国内模型' : '🌍 国外模型';
        const cards = filtered.map(t => renderCard(t, isCustomTool(t.id))).join('');
        content.innerHTML = `
            <div class="single-column">
                <div class="column-header ${AppState.currentRegion === 'CN' ? 'cn' : 'global'}">
                    <span>${label}</span>
                    <span class="count">${filtered.length}</span>
                </div>
                <div class="tools-grid">${cards}</div>
            </div>`;
    }
}

/* ================================================
   判断是否为用户自定义工具
   ================================================ */
function isCustomTool(id) {
    return AppState.customTools.some(t => t.id === id);
}

/* ================================================
   Toast 提示
   ================================================ */
function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast ' + (type === 'warn' ? 'warn' : '');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

/* ================================================
   Modal 控制
   ================================================ */
function openSubmitModal() {
    AppState.editingId = null;
    document.getElementById('modalTitle').textContent = '📝 提交新模型';
    document.getElementById('submitFormBtn').textContent = '提交';
    document.getElementById('toolForm').reset();
    document.getElementById('editId').value = '';
    clearTagSelection();
    document.getElementById('formModal').classList.add('show');
}

function openEditModal(id) {
    const tool = AppState.customTools.find(t => t.id === id);
    if (!tool) return;

    AppState.editingId = id;
    document.getElementById('modalTitle').textContent = '✏️ 编辑模型';
    document.getElementById('submitFormBtn').textContent = '保存修改';
    document.getElementById('editId').value = id;
    document.getElementById('fName').value = tool.name;
    document.getElementById('fUrl').value = tool.url || '';
    document.getElementById('fDesc').value = tool.desc;
    document.getElementById('fRegion').value = tool.region;

    // 恢复标签选中状态
    clearTagSelection();
    (tool.tags || []).forEach(tag => {
        const label = document.querySelector(`#fTagsContainer label:has(input[value="${tag}"])`);
        if (label) {
            label.classList.add('checked');
            label.querySelector('input').checked = true;
        }
    });

    document.getElementById('formModal').classList.add('show');
}

function closeModal() {
    document.getElementById('formModal').classList.remove('show');
    AppState.editingId = null;
}

/* ================================================
   标签多选 UI
   ================================================ */
function clearTagSelection() {
    document.querySelectorAll('#fTagsContainer label').forEach(label => {
        label.classList.remove('checked');
        label.querySelector('input').checked = false;
    });
}

/* ================================================
   表单提交
   ================================================ */
document.getElementById('toolForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const name = document.getElementById('fName').value.trim();
    const url = document.getElementById('fUrl').value.trim();
    const desc = document.getElementById('fDesc').value.trim();
    const region = document.getElementById('fRegion').value;
    const tags = Array.from(
        document.querySelectorAll('#fTagsContainer input:checked')
    ).map(cb => cb.value);

    if (!name || !desc || !region) {
        showToast('请填写必填项（名称、简介、地区）', 'warn');
        return;
    }

    const toolData = {
        id: AppState.editingId || 'custom_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        name,
        logo: '📦',
        region,
        desc,
        tags,
        url,
        isCustom: true,
    };

    if (AppState.editingId) {
        // 更新
        const idx = AppState.customTools.findIndex(t => t.id === AppState.editingId);
        if (idx !== -1) AppState.customTools[idx] = toolData;
        showToast('✅ 模型信息已更新！');
    } else {
        // 新增
        AppState.customTools.push(toolData);
        showToast('✅ 提交成功！模型已添加到列表（仅本地可见）', 'warn');
    }

    saveCustomTools();
    closeModal();
    renderContent();
});

/* ================================================
   标签点击事件（事件委托）
   ================================================ */
document.getElementById('fTagsContainer').addEventListener('click', function (e) {
    const label = e.target.closest('label.tag-checkbox-label');
    if (!label) return;
    const cb = label.querySelector('input');
    cb.checked = !cb.checked;
    label.classList.toggle('checked', cb.checked);
});

/* ================================================
   地区 Tab 切换
   ================================================ */
document.getElementById('regionTabs').addEventListener('click', function (e) {
    const btn = e.target.closest('button[data-region]');
    if (!btn) return;
    document.querySelectorAll('#regionTabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    AppState.currentRegion = btn.dataset.region;
    renderContent();
});

/* ================================================
   搜索输入
   ================================================ */
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', function () {
    AppState.searchQuery = this.value;
    renderContent();
});
searchInput.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
        this.value = '';
        AppState.searchQuery = '';
        renderContent();
    }
});

/* ================================================
   Modal 关闭事件
   ================================================ */
document.getElementById('closeModal').addEventListener('click', closeModal);
document.getElementById('cancelForm').addEventListener('click', closeModal);
document.getElementById('formModal').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
});

/* ================================================
   提交按钮
   ================================================ */
document.getElementById('openSubmitBtn').addEventListener('click', openSubmitModal);

/* ================================================
   初始化
   ================================================ */
loadCustomTools();
renderContent();
</script>
</body>
</html>
