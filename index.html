<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Era Super-Hub · AI 时代超级导航</title>
  <style>
    /* ── CSS Variables & Reset ── */
    :root {
      --bg: #0d0d0f;
      --bg2: #141416;
      --bg3: #1a1a1e;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #f0f0f2;
      --text-muted: #888899;
      --text-dim: #555566;
      --accent: #7c6ef7;
      --accent2: #5ce8c0;
      --accent-glow: rgba(124,110,247,0.35);
      --card-radius: 16px;
      --search-radius: 14px;
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
      text-decoration: none;
    }

    .logo-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn-ghost {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 7px 14px;
      border-radius: 9px;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }

    /* ── Hero / Search Section ── */
    .hero {
      text-align: center;
      padding: 64px 20px 48px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,110,247,0.12);
      border: 1px solid rgba(124,110,247,0.25);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 12px;
      color: #a89ff8;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-title {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 700;
      letter-spacing: -1.5px;
      line-height: 1.12;
      margin-bottom: 14px;
      background: linear-gradient(135deg, #fff 30%, #a89ff8 70%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* ── Search Box ── */
    .search-wrapper {
      position: relative;
      max-width: 680px;
      margin: 0 auto 20px;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: var(--search-radius);
      padding: 4px 4px 4px 18px;
      transition: var(--transition);
      box-shadow: 0 0 0 0 var(--accent-glow);
    }

    .search-box:focus-within {
      border-color: rgba(124,110,247,0.5);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    #searchInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 16px;
      padding: 12px 10px 12px 0;
      min-width: 0;
    }

    #searchInput::placeholder { color: var(--text-dim); }

    .search-hint {
      font-size: 12px;
      color: var(--text-dim);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 7px;
      margin-right: 8px;
      white-space: nowrap;
    }

    .btn-search {
      background: linear-gradient(135deg, var(--accent), #9d8fff);
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-search:hover { opacity: 0.88; transform: scale(0.98); }

    /* ── Slash Command Dropdown ── */
    .slash-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0; right: 0;
      background: var(--bg2);
      border: 1px solid var(--border-hover);
      border-radius: 12px;
      overflow: hidden;
      z-index: 100;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .slash-dropdown.open { display: block; }

    .slash-header {
      padding: 10px 14px 6px;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .slash-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background var(--transition);
    }
    .slash-item:hover, .slash-item.active { background: rgba(124,110,247,0.12); }

    .slash-cmd {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(124,110,247,0.15);
      border-radius: 5px;
      padding: 2px 7px;
      min-width: 36px;
      text-align: center;
    }

    .slash-name { font-size: 14px; color: var(--text); }
    .slash-desc { font-size: 12px; color: var(--text-muted); margin-left: auto; }

    /* ── AI Tab Switcher ── */
    .tab-switcher {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      max-width: 680px;
      margin: 0 auto;
    }

    .ai-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--bg2);
      cursor: pointer;
      transition: var(--transition);
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .ai-tab:hover { border-color: var(--border-hover); color: var(--text); }

    .ai-tab.active {
      background: linear-gradient(135deg, rgba(124,110,247,0.2), rgba(92,232,192,0.1));
      border-color: rgba(124,110,247,0.4);
      color: var(--text);
    }

    .tab-emoji { font-size: 14px; }

    /* ── Section Title ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 40px 0 16px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Bento Grid ── */
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    /* ── Tool Card ── */
    .tool-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 18px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }

    .tool-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, var(--card-glow, transparent) 0%, transparent 70%);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .tool-card:hover::before { opacity: 1; }

    .tool-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    /* Featured cards */
    .tool-card.featured { grid-column: span 2; }

    .card-logo {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .card-logo img {
      width: 100%; height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }

    .card-info { flex: 1; }

    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.4px;
      padding: 2px 8px;
      border-radius: 100px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .badge-chat { background: rgba(124,110,247,0.15); color: #a89ff8; }
    .badge-search { background: rgba(92,232,192,0.12); color: var(--accent2); }
    .badge-image { background: rgba(255,160,80,0.12); color: #ffa050; }
    .badge-productivity { background: rgba(80,200,255,0.12); color: #50c8ff; }
    .badge-custom { background: rgba(255,255,255,0.06); color: var(--text-muted); }

    .card-arrow {
      position: absolute;
      top: 16px; right: 16px;
      font-size: 14px;
      color: var(--text-dim);
      opacity: 0;
      transition: var(--transition);
      transform: translate(-4px, 4px);
    }

    .tool-card:hover .card-arrow { opacity: 1; transform: translate(0, 0); }

    /* ── Add Custom Card ── */
    .add-card {
      border-style: dashed;
      border-color: var(--border);
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 110px;
      cursor: pointer;
      transition: var(--transition);
      border-radius: var(--card-radius);
      color: var(--text-dim);
      font-size: 13px;
    }

    .add-card:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,110,247,0.05); }

    .add-icon { font-size: 22px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border-hover);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.4px;
    }

    .modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 7px;
      letter-spacing: 0.3px;
    }

    .form-input, .form-select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 13px;
      outline: none;
      transition: border-color var(--transition);
    }

    .form-input:focus, .form-select:focus { border-color: rgba(124,110,247,0.5); }
    .form-input::placeholder { color: var(--text-dim); }
    .form-select option { background: var(--bg3); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, var(--accent), #9d8fff);
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-primary:hover { opacity: 0.88; }

    .btn-cancel {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 14px;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-cancel:hover { color: var(--text); border-color: var(--border-hover); }

    /* ── Stats Bar ── */
    .stats-bar {
      display: flex;
      gap: 20px;
      margin-top: 48px;
      padding: 20px 24px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      flex-wrap: wrap;
    }

    .stat-item { text-align: center; flex: 1; min-width: 80px; }

    .stat-num {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 0 0;
      font-size: 12px;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      margin-top: 48px;
    }

    footer a { color: var(--text-dim); text-decoration: none; }
    footer a:hover { color: var(--text-muted); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg2);
      border: 1px solid var(--border-hover);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── API Reserve Hint ── */
    .api-reserve-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--accent2);
      background: rgba(92,232,192,0.08);
      border: 1px solid rgba(92,232,192,0.2);
      border-radius: 6px;
      padding: 3px 9px;
      position: absolute;
      top: 14px; right: 14px;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .bento-grid { grid-template-columns: repeat(3, 1fr); }
      .tool-card.featured { grid-column: span 1; }
    }

    @media (max-width: 600px) {
      .hero { padding: 48px 0 36px; }
      .bento-grid { grid-template-columns: repeat(2, 1fr); }
      .tool-card.featured { grid-column: span 2; }
      .stats-bar { gap: 12px; }
      .tab-switcher { gap: 5px; }
      .ai-tab { padding: 6px 11px; font-size: 12px; }
    }

    @media (max-width: 380px) {
      .bento-grid { grid-template-columns: repeat(2, 1fr); }
      .tool-card { padding: 14px; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }
  </style>
</head>
<body>

<div class="app">

  <!-- ── Header ── -->
  <header>
    <a class="logo" href="#">
      <div class="logo-icon">✦</div>
      AI Era Super-Hub
    </a>
    <div class="header-actions">
      <button class="btn-ghost" onclick="openModal()">＋ 添加工具</button>
      <button class="btn-ghost" id="themeBtn" onclick="toggleTheme()" title="切换主题">☀</button>
    </div>
  </header>

  <!-- ── Hero ── -->
  <section class="hero">
    <div class="hero-eyebrow">
      <span>✦</span>
      AI 时代 · 超级搜索导航
    </div>
    <h1 class="hero-title">一个入口<br>连接所有 AI</h1>
    <p class="hero-sub">聚合主流 AI 工具，搜索直达，零延迟跳转。<br>输入 <code style="color:var(--accent);background:rgba(124,110,247,0.12);padding:1px 6px;border-radius:5px;">/</code> 唤起快捷指令</p>

    <!-- Search Box -->
    <div class="search-wrapper">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="搜索或输入 / 呼出指令..."
          autocomplete="off"
          spellcheck="false"
          autofocus
        />
        <span class="search-hint" id="searchHint">通义千问</span>
        <button class="btn-search" onclick="doSearch()">搜索 ↗</button>
      </div>

      <!-- Slash Command Dropdown -->
      <div class="slash-dropdown" id="slashDropdown">
        <div class="slash-header">快捷跳转指令</div>
      </div>
    </div>

    <!-- AI Tab Switcher -->
    <div class="tab-switcher" id="tabSwitcher"></div>
  </section>

  <!-- ── Chat AI Matrix ── -->
  <div class="section-label">💬 对话类 AI</div>
  <div class="bento-grid" id="chatGrid"></div>

  <!-- ── Search AI ── -->
  <div class="section-label">🔍 搜索类 AI</div>
  <div class="bento-grid" id="searchGrid"></div>

  <!-- ── Productivity ── -->
  <div class="section-label">⚡ 生产力工具</div>
  <div class="bento-grid" id="prodGrid"></div>

  <!-- ── Custom Tools ── -->
  <div class="section-label" id="customSection" style="display:none;">🌐 我的自定义</div>
  <div class="bento-grid" id="customGrid"></div>

  <!-- ── Stats Bar ── -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">已收录工具</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statCats">4</div>
      <div class="stat-label">分类</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">∞</div>
      <div class="stat-label">API 扩展预留</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">0ms</div>
      <div class="stat-label">跳转延迟</div>
    </div>
  </div>

</div><!-- /app -->

<!-- ── Footer ── -->
<footer>
  <p>AI Era Super-Hub &nbsp;·&nbsp; <a href="#">数据结构文档</a> &nbsp;·&nbsp; <a href="#">API 接入指南</a></p>
  <p style="margin-top:8px;">数据存储于 LocalStorage · 架构预留云数据库 & API 调用接口</p>
</footer>

<!-- ── Add Tool Modal ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <div class="modal-title">✦ 添加自定义工具</div>
    <div class="modal-sub">工具信息存储于本地，支持迁移至云数据库</div>

    <div class="form-group">
      <label class="form-label">工具名称 *</label>
      <input type="text" class="form-input" id="f_name" placeholder="例：Midjourney" />
    </div>
    <div class="form-group">
      <label class="form-label">图标（Emoji 或图片 URL）</label>
      <input type="text" class="form-input" id="f_logo" placeholder="🎨 或 https://..." />
    </div>
    <div class="form-group">
      <label class="form-label">基础网址 *</label>
      <input type="text" class="form-input" id="f_url" placeholder="https://midjourney.com" />
    </div>
    <div class="form-group">
      <label class="form-label">搜索跳转后缀（可选）</label>
      <input type="text" class="form-input" id="f_suffix" placeholder="?q= 或 /search?query=" />
    </div>
    <div class="form-group">
      <label class="form-label">分类</label>
      <select class="form-select" id="f_category">
        <option value="chat">💬 对话类</option>
        <option value="search">🔍 搜索类</option>
        <option value="image">🎨 绘图类</option>
        <option value="productivity">⚡ 生产力</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">简短描述</label>
      <input type="text" class="form-input" id="f_desc" placeholder="一句话介绍这个工具" />
    </div>
    <div class="form-group">
      <label class="form-label">快捷指令（/ 命令，可选）</label>

function loadCustomTools() {
  try {
    const raw = localStorage.getItem("ai_hub_custom_tools");
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveCustomToolsToStorage(tools) {
  localStorage.setItem("ai_hub_custom_tools", JSON.stringify(tools));
}

/* ════════════════════════════════════════

   ════════════════════════════════════════ */
function getBadgeInfo(cat) {
  const map = {
    chat: { cls: "badge-chat", label: "对话" },
    search: { cls: "badge-search", label: "搜索" },
    image: { cls: "badge-image", label: "绘图" },
    productivity: { cls: "badge-productivity", label: "生产力" },
    custom: { cls: "badge-custom", label: "自定义" }
  };
  return map[cat] || map.custom;
}

function renderCard(tool, isCustom = false) {
  const badge = getBadgeInfo(isCustom ? "custom" : tool.category);
  const logoContent = tool.logo.startsWith("http")
    ? `<img src="${tool.logo}" alt="${tool.name}" />`
    : tool.logo;

  return `
    <a class="tool-card ${tool.featured ? 'featured' : ''}"
       href="${tool.target_url}"
       target="_blank"
       rel="noopener noreferrer"
       style="--card-glow: ${tool.cardGlow || 'rgba(124,110,247,0.1)'};"
       title="${tool.description}"
       onclick="handleCardClick(event, '${tool.id}')">
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <div class="card-logo" style="background:${tool.logoColor || '#222'}20;color:${tool.logoColor || '#fff'};">${logoContent}</div>
        <div class="card-info">
          <div class="card-name">${tool.name}</div>
          <div class="card-desc">${tool.description || ''}</div>
          <span class="card-badge ${badge.cls}">${badge.label}</span>
        </div>
      </div>
      ${tool.slash ? `<div class="api-reserve-badge" style="font-size:10px;padding:2px 7px;opacity:0.5;">/${tool.slash}</div>` : ''}

}

/* ════════════════════════════════════════
   BUILD UI
   ════════════════════════════════════════ */
function buildUI() {
  const customs = loadCustomTools();
  allTools = [...AI_TOOLS_DB, ...customs];

  /* Tab Switcher — search-capable tools */
  const tabTools = allTools.filter(t => t.search_suffix || t.category === "chat");
  const tabHTML = tabTools.map(t => `
    <div class="ai-tab ${t.id === activeTabId ? 'active' : ''}"
         onclick="switchTab('${t.id}')"
         data-id="${t.id}">
      <span class="tab-emoji">${t.logo.startsWith("http") ? '🔗' : t.logo}</span>
      ${t.name}
    </div>`).join('');
  document.getElementById("tabSwitcher").innerHTML = tabHTML;

  /* Grids */
  const chat = allTools.filter(t => t.category === "chat").sort((a,b)=>a.priority-b.priority);
  const search = allTools.filter(t => t.category === "search").sort((a,b)=>a.priority-b.priority);
  const prod = allTools.filter(t => t.category === "productivity").sort((a,b)=>a.priority-b.priority);

  document.getElementById("chatGrid").innerHTML = chat.map(t => renderCard(t)).join('') + renderAddCard("chatGrid");
  document.getElementById("searchGrid").innerHTML = search.map(t => renderCard(t)).join('') + renderAddCard("searchGrid");
  document.getElementById("prodGrid").innerHTML = prod.map(t => renderCard(t)).join('');

  /* Custom Grid */
  if (customs.length > 0) {
    document.getElementById("customSection").style.display = "flex";
    document.getElementById("customGrid").innerHTML = customs.map(t => renderCard(t, true)).join('');
  } else {
    document.getElementById("customSection").style.display = "none";
    document.getElementById("customGrid").innerHTML = "";
  }

  /* Stats */
  document.getElementById("statTotal").textContent = allTools.length;

  /* Slash menu */
  buildSlashMenu();

  /* Sync hint */
  updateSearchHint();
}

/* ════════════════════════════════════════
   TAB SWITCHER
   ════════════════════════════════════════ */
function switchTab(id) {
  activeTabId = id;
  document.querySelectorAll(".ai-tab").forEach(el => {
    el.classList.toggle("active", el.dataset.id === id);
  });
  updateSearchHint();
  showToast(`已切换至 ${allTools.find(t=>t.id===id)?.name || id}`);
}

function updateSearchHint() {
  const t = allTools.find(t => t.id === activeTabId);
  document.getElementById("searchHint").textContent = t ? t.name : "直接跳转";
}

/* ════════════════════════════════════════
   SEARCH / OMNI-SEARCH
   ════════════════════════════════════════ */
function doSearch() {
  const query = document.getElementById("searchInput").value.trim();
  const target = allTools.find(t => t.id === activeTabId);
  if (!target) return;

  if (!query) {
    window.open(target.target_url, "_blank");
    return;
  }

  let url;
  if (target.search_suffix) {
    /* If suffix is a full URL template, append query; else append to base */
    url = target.search_suffix.startsWith("http")
      ? target.search_suffix + encodeURIComponent(query)
      : target.target_url + target.search_suffix + encodeURIComponent(query);
  } else {
    url = target.target_url;
  }

  window.open(url, "_blank");
}

/* ════════════════════════════════════════
   SLASH COMMAND SYSTEM
   ════════════════════════════════════════ */
function buildSlashMenu() {
  const items = allTools.filter(t => t.slash);
  const html = items.map((t, i) => `
    <div class="slash-item" data-idx="${i}" data-url="${t.target_url}" data-id="${t.id}"
         onclick="executeSlash('${t.id}')">
      <span class="slash-cmd">/${t.slash}</span>
      <span class="slash-name">${t.name}</span>
      <span class="slash-desc">${t.description?.slice(0,18) || ''}…</span>
    </div>`).join('');
  document.getElementById("slashDropdown").innerHTML =
    `<div class="slash-header">快捷跳转指令（↑↓ 选择，Enter 确认）</div>` + html;
}

function executeSlash(toolId) {
  switchTab(toolId);
  hideSlash();
  const input = document.getElementById("searchInput");
  // Clear the slash command text, keep anything typed after
  const val = input.value;
  const slashEnd = val.indexOf(' ');
  input.value = slashEnd > -1 ? val.slice(slashEnd + 1) : "";
  input.focus();
  showToast(`快捷跳转 → ${allTools.find(t=>t.id===toolId)?.name}`);
}

function showSlash(filterText = "") {
  const dd = document.getElementById("slashDropdown");
  const items = dd.querySelectorAll(".slash-item");
  let visible = 0;
  items.forEach(item => {
    const cmd = item.querySelector(".slash-cmd").textContent;
    const name = item.querySelector(".slash-name").textContent;
    const match = !filterText || cmd.includes(filterText) || name.toLowerCase().includes(filterText);
    item.style.display = match ? "flex" : "none";
    if (match) visible++;
  });
  dd.classList.toggle("open", visible > 0);
  slashActiveIdx = -1;
}

function hideSlash() {
  document.getElementById("slashDropdown").classList.remove("open");
  slashActiveIdx = -1;
}

/* ════════════════════════════════════════
   INPUT HANDLERS
   ════════════════════════════════════════ */
document.getElementById("searchInput").addEventListener("input", function() {
  const val = this.value;
  if (val.startsWith("/")) {
    const filter = val.slice(1).toLowerCase();
    showSlash(filter);
  } else {
    hideSlash();
  }
});

document.getElementById("searchInput").addEventListener("keydown", function(e) {
  const dd = document.getElementById("slashDropdown");
  const isOpen = dd.classList.contains("open");
  const items = [...dd.querySelectorAll(".slash-item[style=''],.slash-item:not([style])")].filter(
    el => el.style.display !== "none"
  );

  if (isOpen && (e.key === "ArrowDown" || e.key === "ArrowUp")) {
    e.preventDefault();
    slashActiveIdx = e.key === "ArrowDown"
      ? Math.min(slashActiveIdx + 1, items.length - 1)
      : Math.max(slashActiveIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle("active", i === slashActiveIdx));
    return;
  }

  if (isOpen && e.key === "Enter" && slashActiveIdx >= 0) {
    e.preventDefault();
    const active = items[slashActiveIdx];
    if (active) {
      const toolId = active.dataset.id;
      executeSlash(toolId);
    }
    return;
  }

  if (e.key === "Escape") { hideSlash(); return; }
  if (e.key === "Enter") { doSearch(); }
});

/* Close slash on outside click */
document.addEventListener("click", function(e) {
  if (!document.getElementById("searchInput").contains(e.target) &&
      !document.getElementById("slashDropdown").contains(e.target)) {
    hideSlash();
  }
});

  /* Just switch the active tab for quick search next time */
  activeTabId = toolId;

function openModal() {
  document.getElementById("modalOverlay").classList.add("open");
  setTimeout(() => document.getElementById("f_name").focus(), 100);
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  ["f_name","f_logo","f_url","f_suffix","f_desc","f_cmd"].forEach(id => {
    document.getElementById(id).value = "";
  });
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModal();
}

function saveCustomTool() {
  const name = document.getElementById("f_name").value.trim();
  const url = document.getElementById("f_url").value.trim();
  if (!name || !url) { showToast("❌ 名称和网址为必填项"); return; }

  const logo = document.getElementById("f_logo").value.trim() || "🔗";
  const suffix = document.getElementById("f_suffix").value.trim();
  const category = document.getElementById("f_category").value;
  const desc = document.getElementById("f_desc").value.trim();
  const cmd = document.getElementById("f_cmd").value.trim().replace(/^\//, "");

  /* Schema mirrors AI_Tools_DB / QClaw collection */
  const newTool = {
    id: "custom_" + Date.now(),
    name,
    category,
    logo,
    logoColor: "#7c6ef7",
    target_url: url.startsWith("http") ? url : "https://" + url,
    search_suffix: suffix,
    description: desc,
    priority: 99,
    slash: cmd || undefined,
    cardGlow: "rgba(124,110,247,0.1)",
    isCustom: true,
    createdAt: new Date().toISOString()
  };

  const existing = loadCustomTools();
  existing.push(newTool);
  saveCustomToolsToStorage(existing);

  closeModal();
  buildUI();
  showToast(`✅ "${name}" 已添加到自定义工具`);
}

/* ════════════════════════════════════════
   THEME — Light / Dark toggle
   ════════════════════════════════════════ */
let isDark = true;

function toggleTheme() {
  isDark = !isDark;
  const root = document.documentElement;
  if (!isDark) {
    root.style.setProperty("--bg", "#f4f4f6");
    root.style.setProperty("--bg2", "#ffffff");
    root.style.setProperty("--bg3", "#f0f0f2");
    root.style.setProperty("--border", "rgba(0,0,0,0.08)");
    root.style.setProperty("--border-hover", "rgba(0,0,0,0.16)");
    root.style.setProperty("--text", "#111118");
    root.style.setProperty("--text-muted", "#555566");
    root.style.setProperty("--text-dim", "#999aaa");
    document.getElementById("themeBtn").textContent = "🌙";
  } else {
    root.style.setProperty("--bg", "#0d0d0f");
    root.style.setProperty("--bg2", "#141416");
    root.style.setProperty("--bg3", "#1a1a1e");
    root.style.setProperty("--border", "rgba(255,255,255,0.08)");
    root.style.setProperty("--border-hover", "rgba(255,255,255,0.18)");
    root.style.setProperty("--text", "#f0f0f2");
    root.style.setProperty("--text-muted", "#888899");
    root.style.setProperty("--text-dim", "#555566");
    document.getElementById("themeBtn").textContent = "☀";
  }
}

/* ════════════════════════════════════════
   TOAST
   ════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
}

buildUI();
