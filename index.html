<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 ManjuFlow AI - 漫剧制作工作台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1426 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 1px;
            height: 1px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        .sidebar {
            width: 250px;
            background: rgba(15, 20, 38, 0.6);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(100, 150, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid rgba(100, 150, 255, 0.2);
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: #6496ff;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .btn-new-project {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6496ff, #9664ff);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .btn-new-project:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(100, 150, 255, 0.3);
        }

        .project-item {
            padding: 10px 12px;
            background: rgba(100, 150, 255, 0.05);
            border: 1px solid rgba(100, 150, 255, 0.1);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }

        .project-item:hover {
            background: rgba(100, 150, 255, 0.15);
            border-color: rgba(100, 150, 255, 0.3);
        }

        .project-item.active {
            background: linear-gradient(135deg, rgba(100, 150, 255, 0.3), rgba(150, 100, 255, 0.2));
            border-color: #6496ff;
            color: #ffffff;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(100, 150, 255, 0.2);
            background: rgba(15, 20, 38, 0.4);
            backdrop-filter: blur(10px);
        }

        .tab {
            padding: 8px 16px;
            background: rgba(100, 150, 255, 0.1);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 20px;
            color: #a0a0ff;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .tab:hover {
            background: rgba(100, 150, 255, 0.2);
        }

        .tab.active {
            background: linear-gradient(135deg, #6496ff, #9664ff);
            border-color: #6496ff;
            color: white;
        }

        .content-area {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .panel {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: none;
        }

        .panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #a0a0ff;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(100, 150, 255, 0.05);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
            resize: vertical;
            min-height: 80px;
        }

        .form-input:focus {
            outline: none;
            background: rgba(100, 150, 255, 0.1);
            border-color: #6496ff;
            box-shadow: 0 0 12px rgba(100, 150, 255, 0.2);
        }

        .character-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .character-tag {
            padding: 8px 12px;
            background: rgba(100, 150, 255, 0.1);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .character-tag:hover {
            background: rgba(100, 150, 255, 0.2);
            border-color: #6496ff;
        }

        .character-tag.selected {
            background: linear-gradient(135deg, #6496ff, #9664ff);
            border-color: #6496ff;
            color: white;
        }

        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .template-card {
            padding: 15px;
            background: rgba(100, 150, 255, 0.05);
            border: 1px solid rgba(100, 150, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .template-card:hover {
            background: rgba(100, 150, 255, 0.15);
            border-color: #6496ff;
            transform: translateY(-4px);
        }

        .template-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .template-name {
            font-size: 12px;
            font-weight: 600;
            color: #6496ff;
            margin-bottom: 5px;
        }

        .template-desc {
            font-size: 11px;
            color: #a0a0ff;
        }

        .option-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .option-btn {
            padding: 8px 12px;
            background: rgba(100, 150, 255, 0.1);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 6px;
            color: #a0a0ff;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .option-btn:hover {
            background: rgba(100, 150, 255, 0.2);
            border-color: #6496ff;
        }

        .option-btn.selected {
            background: linear-gradient(135deg, #6496ff, #9664ff);
            border-color: #6496ff;
            color: white;
        }

        .right-panel {
            width: 280px;
            background: rgba(15, 20, 38, 0.6);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(100, 150, 255, 0.2);
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-generate {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6496ff, #9664ff);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(100, 150, 255, 0.4);
        }

        .btn-action {
            padding: 10px 16px;
            background: rgba(100, 150, 255, 0.1);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 6px;
            color: #a0a0ff;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .btn-action:hover {
            background: rgba(100, 150, 255, 0.2);
            border-color: #6496ff;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(15, 20, 38, 0.95), rgba(30, 40, 70, 0.95));
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(100, 150, 255, 0.2);
        }

        .modal-header {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 20px;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn-primary {
            padding: 10px 20px;
            background: linear-gradient(135deg, #6496ff, #9664ff);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(100, 150, 255, 0.3);
        }

        .btn-secondary {
            padding: 10px 20px;
            background: rgba(100, 150, 255, 0.1);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 6px;
            color: #a0a0ff;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: rgba(100, 150, 255, 0.2);
            border-color: #6496ff;
        }

        .status-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: rgba(100, 150, 255, 0.9);
            color: white;
            border-radius: 6px;
            font-size: 13px;
            z-index: 2000;
            max-width: 300px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(100, 150, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6496ff, #9664ff);
            animation: progress 3s ease-in-out forwards;
        }

        @keyframes progress {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <!-- 左侧栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">📁 项目</div>
            </div>
            <div class="sidebar-content">
                <button class="btn-new-project" onclick="createNewProject()">+ 新建项目</button>
                <div id="projects-list"></div>
            </div>
        </div>

        <!-- 中间内容区 -->
        <div class="main-content">
            <div class="tabs">
                <button class="tab active" onclick="switchTab(1)">📝 故事编辑</button>
                <button class="tab" onclick="switchTab(2)">👥 角色配置</button>
                <button class="tab" onclick="switchTab(3)">⚙️ 参数调整</button>
                <button class="tab" onclick="switchTab(4)">🎨 高级选项</button>
            </div>

            <div class="content-area">
                <!-- 第1步：故事编辑 -->
                <div class="panel active" id="panel-1">
                    <div class="form-group">
                        <label class="form-label">📖 故事内容</label>
                        <textarea class="form-input" id="story-input" placeholder="在这里输入您的漫剧故事..." style="min-height: 200px;"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">🎯 推荐角色</label>
                        <div class="character-list" id="recommended-chars"></div>
                    </div>
                    <button class="btn-action" onclick="optimizeStory('expand')">✨ 扩展故事</button>
                    <button class="btn-action" onclick="optimizeStory('simplify')">📌 简化故事</button>
                </div>

                <!-- 第2步：角色配置 -->
                <div class="panel" id="panel-2">
                    <div class="form-group">
                        <label class="form-label">✅ 已选角色</label>
                        <div class="character-list" id="selected-chars"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">📚 角色库</label>
                        <div class="character-list" id="all-chars"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">➕ 新建角色</label>
                        <input type="text" class="form-input" id="new-char-name" placeholder="角色名称" style="min-height: 40px;">
                        <button class="btn-action" onclick="createNewCharacter()" style="margin-top: 10px;">创建角色</button>
                    </div>
                </div>

                <!-- 第3步：参数调整 -->
                <div class="panel" id="panel-3">
                    <div class="form-group">
                        <label class="form-label">🧠 LLM 模型</label>
                        <div class="option-group" id="llm-options">
                            <button class="option-btn selected" data-value="qwen">通义千问</button>
                            <button class="option-btn" data-value="deepseek">DeepSeek</button>
                            <button class="option-btn" data-value="claude">Claude</button>
                            <button class="option-btn" data-value="gpt4">GPT-4</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">🎬 生成模型</label>
                        <div class="option-group" id="gen-options">
                            <button class="option-btn selected" data-value="jimeng">即梦</button>
                            <button class="option-btn" data-value="kuling">可灵</button>
                            <button class="option-btn" data-value="hailu">海螺</button>
                            <button class="option-btn" data-value="wanxiang">万相</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">🎨 艺术风格</label>
                        <div class="option-group" id="style-options">
                            <button class="option-btn selected" data-value="manga">日本漫画</button>
                            <button class="option-btn" data-value="guoman">国风漫画</button>
                            <button class="option-btn" data-value="3d">3D科幻</button>
                            <button class="option-btn" data-value="western">欧美风格</button>
                            <button class="option-btn" data-value="oil">油画艺术</button>
                            <button class="option-btn" data-value="sketch">素描风格</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">📺 分辨率</label>
                        <div class="option-group" id="res-options">
                            <button class="option-btn" data-value="720">720p</button>
                            <button class="option-btn selected" data-value="1080">1080p</button>
                            <button class="option-btn" data-value="2k">2K</button>
                            <button class="option-btn" data-value="4k">4K</button>
                        </div>
                    </div>
                </div>

                <!-- 第4步：高级选项 -->
                <div class="panel" id="panel-4">
                    <div class="form-group">
                        <label class="form-label">⏱️ 每幕场景数</label>
                        <input type="range" id="frame-count" min="2" max="12" value="6" style="width: 100%;">
                        <div style="font-size: 12px; color: #6496ff; margin-top: 5px;">当前: <span id="frame-display">6 场景</span></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">🎵 音乐配置</label>
                        <div class="option-group" id="music-options">
                            <button class="option-btn selected" data-value="auto">自动</button>
                            <button class="option-btn" data-value="epic">史诗风格</button>
                            <button class="option-btn" data-value="gentle">温和风格</button>
                            <button class="option-btn" data-value="none">无音乐</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">📝 字幕配置</label>
                        <div class="option-group" id="subtitle-options">
                            <button class="option-btn selected" data-value="zh">中文</button>
                            <button class="option-btn" data-value="en">英文</button>
                            <button class="option-btn" data-value="dual">双语</button>
                            <button class="option-btn" data-value="none">无字幕</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">🎬 输出格式</label>
                        <div class="option-group" id="format-options">
                            <button class="option-btn selected" data-value="mp4">MP4</button>
                            <button class="option-btn" data-value="mov">MOV</button>
                            <button class="option-btn" data-value="webm">WebM</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧栏 -->
        <div class="right-panel">
            <div>
                <h3 style="color: #6496ff; font-size: 13px; margin-bottom: 10px;">📊 项目预览</h3>
                <div style="font-size: 12px; color: #a0a0ff; line-height: 1.8;">
                    <div>字数: <span id="preview-words">0</span></div>
                    <div>角色: <span id="preview-chars">0</span></div>
                    <div>预估时长: <span id="preview-time">-</span></div>
                </div>
            </div>
            <button class="btn-generate" onclick="generateMangaDrama()">🚀 生成漫剧</button>
        </div>
    </div>

    <!-- 新建项目对话框 -->
    <div class="modal" id="modal-new-project">
        <div class="modal-content">
            <div class="modal-header">➕ 新建项目</div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">项目名称</label>
                    <input type="text" class="form-input" id="input-project-name" placeholder="输入项目名称" style="min-height: 40px;">
                </div>
                <div class="form-group">
                    <label class="form-label">项目描述</label>
                    <textarea class="form-input" id="input-project-desc" placeholder="输入项目描述"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">📋 选择模板</label>
                    <div class="template-grid" id="template-grid">
                        <div class="template-card" onclick="applyTemplate('manga')">
                            <div class="template-icon">🎌</div>
                            <div class="template-name">日本漫画</div>
                            <div class="template-desc">热血、少年</div>
                        </div>
                        <div class="template-card" onclick="applyTemplate('guoman')">
                            <div class="template-icon">🏯</div>
                            <div class="template-name">国风漫画</div>
                            <div class="template-desc">武侠、古装</div>
                        </div>
                        <div class="template-card" onclick="applyTemplate('3d')">
                            <div class="template-icon">🤖</div>
                            <div class="template-name">3D科幻</div>
                            <div class="template-desc">科幻、未来</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('modal-new-project')">取消</button>
                <button class="btn-primary" onclick="confirmNewProject()">创建</button>
            </div>
        </div>
    </div>

    <!-- 保存位置对话框 -->
    <div class="modal" id="modal-save">
        <div class="modal-content">
            <div class="modal-header">💾 选择保存位置</div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">位置</label>
                    <div class="option-group" id="location-options">
                        <button class="option-btn selected" data-location="downloads">📥 下载</button>
                        <button class="option-btn" data-location="desktop">🖥️ 桌面</button>
                        <button class="option-btn" data-location="documents">📄 文档</button>
                        <button class="option-btn" data-location="custom">📁 自定义</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">文件名</label>
                    <input type="text" class="form-input" id="input-filename" style="min-height: 40px;">
                </div>
                <div style="font-size: 12px; color: #6496ff; margin-top: 10px;">
                    保存位置: <span id="full-path">C:\Users\用户\Downloads\</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('modal-save')">取消</button>
                <button class="btn-primary" onclick="confirmSave()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 工具函数 ==========
        function generateStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        function showMessage(msg) {
            const div = document.createElement('div');
            div.className = 'status-message';
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // ========== 数据管理 ==========
        const AppState = {
            projects: JSON.parse(localStorage.getItem('mf_projects')) || [],
            characters: JSON.parse(localStorage.getItem('mf_characters')) || [
                { id: 'char_1', name: '林诗雨', traits: ['神秘', '法师', '坚强'] },
                { id: 'char_2', name: '秦云天', traits: ['热血', '骑士', '勇敢'] },
                { id: 'char_3', name: '月影', traits: ['刺客', '邪恶', '聪慧'] },
                { id: 'char_4', name: '苏晓晓', traits: ['温柔', '治愈', '善良'] },
                { id: 'char_5', name: '李战天', traits: ['战神', '无敌', '热血'] }
            ],
            currentProject: null,
            selectedChars: [],
            selectedTemplate: null,
            params: {
                llm: 'qwen',
                gen: 'jimeng',
                style: 'manga',
                res: '1080',
                music: 'auto',
                subtitle: 'zh',
                format: 'mp4',
                frameCount: 6
            }
        };

        function saveState() {
            localStorage.setItem('mf_projects', JSON.stringify(AppState.projects));
            localStorage.setItem('mf_characters', JSON.stringify(AppState.characters));
        }

        // ========== UI 渲染 ==========
        function renderProjects() {
            const list = document.getElementById('projects-list');
            list.innerHTML = AppState.projects.map(p => `
                <div class="project-item ${p.id === AppState.currentProject?.id ? 'active' : ''}" 
                     onclick="selectProject('${p.id}')">
                    <div>${p.name}</div>
                    <div style="font-size: 11px; color: #6496ff; margin-top: 4px;">${p.created}</div>
                </div>
            `).join('');
        }

        function renderCharacters() {
            const selected = document.getElementById('selected-chars');
            const all = document.getElementById('all-chars');

            selected.innerHTML = AppState.selectedChars.map(id => {
                const char = AppState.characters.find(c => c.id === id);
                return `<button class="character-tag selected" onclick="toggleChar('${id}', true)">${char.name} ✓</button>`;
            }).join('');

            all.innerHTML = AppState.characters.map(c => `
                <button class="character-tag ${AppState.selectedChars.includes(c.id) ? 'selected' : ''}" 
                        onclick="toggleChar('${c.id}')">
                    ${c.name}
                </button>
            `).join('');

            updateRecommended();
        }

        function updateRecommended() {
            const story = document.getElementById('story-input').value.toLowerCase();
            const matched = [];

            AppState.characters.forEach(char => {
                let score = 0;
                char.traits.forEach(trait => {
                    if (story.includes(trait)) score++;
                });
                if (score > 0) matched.push({ char, score });
            });

            matched.sort((a, b) => b.score - a.score);

            const recommended = document.getElementById('recommended-chars');
            recommended.innerHTML = matched.length > 0 
                ? matched.map(m => `
                    <button class="character-tag" onclick="toggleChar('${m.char.id}')">
                        🎯 ${m.char.name} (${m.score}☆)
                    </button>
                `).join('')
                : '<div style="color: #6496ff; font-size: 12px;">输入故事后会自动推荐角色</div>';
        }

        // ========== 事件处理 ==========
        function switchTab(num) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i + 1 === num);
            });
            document.querySelectorAll('.panel').forEach((p, i) => {
                p.classList.toggle('active', i + 1 === num);
            });
        }

        function createNewProject() {
            AppState.selectedTemplate = null;
            document.getElementById('input-project-name').value = '';
            document.getElementById('input-project-desc').value = '';
            openModal('modal-new-project');
        }

        function confirmNewProject() {
            const name = document.getElementById('input-project-name').value.trim() || '未命名项目';
            const desc = document.getElementById('input-project-desc').value;

            const project = {
                id: 'proj_' + Date.now(),
                name,
                desc,
                created: new Date().toLocaleDateString('zh-CN'),
                template: AppState.selectedTemplate
            };

            AppState.projects.push(project);
            AppState.currentProject = project;
            AppState.selectedChars = [];
            saveState();
            renderProjects();
            renderCharacters();
            closeModal('modal-new-project');
            showMessage(`✅ 项目 "${name}" 创建成功！`);
        }

        function selectProject(id) {
            AppState.currentProject = AppState.projects.find(p => p.id === id);
            renderProjects();
            showMessage(`✅ 切换到项目: ${AppState.currentProject.name}`);
        }

        function toggleChar(id, remove = false) {
            const idx = AppState.selectedChars.indexOf(id);
            if (idx >= 0 && remove) {
                AppState.selectedChars.splice(idx, 1);
            } else if (idx < 0) {
                AppState.selectedChars.push(id);
            } else if (idx >= 0) {
                AppState.selectedChars.splice(idx, 1);
            } else {
                AppState.selectedChars.push(id);
            }
            renderCharacters();
            document.getElementById('preview-chars').textContent = AppState.selectedChars.length;
        }

        function createNewCharacter() {
            const name = document.getElementById('new-char-name').value.trim();
            if (!name) {
                showMessage('❌ 请输入角色名称');
                return;
            }

            const char = {
                id: 'char_' + Date.now(),
                name,
                traits: ['自定义角色']
            };

            AppState.characters.push(char);
            AppState.selectedChars.push(char.id);
            saveState();
            renderCharacters();
            document.getElementById('new-char-name').value = '';
            showMessage(`✅ 角色 "${name}" 创建成功！`);
        }

        function optimizeStory(type) {
            const text = document.getElementById('story-input').value;
            if (!text.trim()) {
                showMessage('❌ 请先输入故事');
                return;
            }
            showMessage(`✨ 正在${type === 'expand' ? '扩展' : '简化'}故事...`);
        }

        function applyTemplate(template) {
            AppState.selectedTemplate = template;
            showMessage(`✅ 已选择模板: ${template}`);
        }

        function generateMangaDrama() {
            if (!AppState.currentProject) {
                showMessage('❌ 请先创建项目');
                return;
            }
            if (!document.getElementById('story-input').value.trim()) {
                showMessage('❌ 请先输入故事内容');
                return;
            }

            document.getElementById('input-filename').value = (AppState.currentProject.name || '漫剧') + '.mp4';
            openModal('modal-save');
        }

        function confirmSave() {
            const filename = document.getElementById('input-filename').value.trim();
            if (!filename) {
                showMessage('❌ 请输入文件名');
                return;
            }

            closeModal('modal-save');

            // 模拟生成过程
            const statusDiv = document.createElement('div');
            statusDiv.className = 'status-message';
            statusDiv.innerHTML = '🚀 正在生成漫剧...<div class="progress-bar"><div class="progress-fill"></div></div>';
            document.body.appendChild(statusDiv);

            setTimeout(() => {
                const path = document.getElementById('full-path').textContent + filename;
                
                // 生成真实的 MP4 视频文件（模拟）
                // 这里我们创建一个简单的视频文件头
                const mp4Header = new Uint8Array([
                    0x00, 0x00, 0x00, 0x20, 0x66, 0x74, 0x79, 0x70, 0x69, 0x73, 0x6f, 0x6d, 0x00, 0x00, 0x02, 0x00,
                    0x69, 0x73, 0x6f, 0x6d, 0x69, 0x73, 0x6f, 0x32, 0x6d, 0x70, 0x34, 0x31
                ]);

                // 添加模拟的视频数据
                const simulatedVideoData = new Uint8Array(1024 * 100); // 100KB 的模拟视频数据
                for (let i = 0; i < simulatedVideoData.length; i++) {
                    simulatedVideoData[i] = Math.random() * 256;
                }

                // 合并数据
                const fullData = new Uint8Array(mp4Header.length + simulatedVideoData.length);
                fullData.set(mp4Header, 0);
                fullData.set(simulatedVideoData, mp4Header.length);

                // 创建 Blob 并下载
                const blob = new Blob([fullData], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();

                // 清理
                URL.revokeObjectURL(url);

                statusDiv.remove();
                showMessage(`✅ 漫剧已保存到: ${path}`);
            }, 3000);
        }

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            generateStars();
            renderProjects();
            renderCharacters();

            // 更新预览
            document.getElementById('story-input').addEventListener('input', () => {
                const text = document.getElementById('story-input').value;
                document.getElementById('preview-words').textContent = text.length;
                updateRecommended();
            });

            // 帧数滑块
            document.getElementById('frame-count').addEventListener('input', (e) => {
                AppState.params.frameCount = e.target.value;
                document.getElementById('frame-display').textContent = e.target.value + ' 场景';
            });

            // 参数选择 - 第3步
            document.querySelectorAll('#llm-options .option-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#llm-options .option-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    AppState.params.llm = this.dataset.value;
                });
            });

            document.querySelectorAll('#gen-options .option-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#gen-options .option-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    AppState.params.gen = this.dataset.value;
                });
            });

            document.querySelectorAll('#style-options .option-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#style-options .option-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    AppState.params.style = this.dataset.value;
                });
            });

            document.querySelectorAll('#res-options .option-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#res-options .option-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    AppState.params.res = this.dataset.value;
                });
            });

            // 高级选项 - 第4步
            document.querySelectorAll('#music-options .option-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#music-options .option-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    AppState.params.music = this.dataset.value;
                    showMessage(`✅ 音乐设置: ${this.textContent}`);
                });
            });

            document.querySelectorAll('#subtitle-options .option-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#subtitle-options .option-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    AppState.params.subtitle = this.dataset.value;
                    showMessage(`✅ 字幕设置: ${this.textContent}`);
                });
            });

            document.querySelectorAll('#format-options .option-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#format-options .option-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    AppState.params.format = this.dataset.value;
                    showMessage(`✅ 格式设置: ${this.textContent}`);
                });
            });

            // 保存位置选择
            document.querySelectorAll('#location-options .option-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#location-options .option-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');

                    const paths = {
                        'downloads': 'C:\\Users\\用户\\Downloads\\',
                        'desktop': 'C:\\Users\\用户\\Desktop\\',
                        'documents': 'C:\\Users\\用户\\Documents\\',
                        'custom': 'C:\\自定义位置\\'
                    };
                    document.getElementById('full-path').textContent = paths[this.dataset.location];
                });
            });
        });
    </script>
</body>
</html>
